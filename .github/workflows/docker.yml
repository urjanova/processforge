name: Publish Docker Image

on:
  push:
    branches:
      - master
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure GHCR package is public
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const packageName = context.repo.repo.toLowerCase();

            const { data: ownerData } = await github.rest.users.getByUsername({
              username: owner,
            });

            const endpoint = ownerData.type === "Organization"
              ? "PATCH /orgs/{org}/packages/container/{package_name}/visibility"
              : "PATCH /user/packages/container/{package_name}/visibility";

            try {
              const params = ownerData.type === "Organization"
                ? {
                    org: owner,
                    package_name: packageName,
                    visibility: "public",
                  }
                : {
                    package_name: packageName,
                    visibility: "public",
                  };

              await github.request(endpoint, params);

              core.info(`Package ${packageName} is public.`);
            } catch (error) {
              core.warning(error.message);
            }
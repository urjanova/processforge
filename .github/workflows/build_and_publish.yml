name: Build and Publish Docker Image

on:
  push:
    branches: [ "master" ]
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Ensure GHCR package is public
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const packageName = context.repo.repo.toLowerCase();

            const { data: ownerData } = await github.rest.users.getByUsername({
              username: owner,
            });

            const endpoint = ownerData.type === "Organization"
              ? "PATCH /orgs/{org}/packages/container/{package_name}/visibility"
              : "PATCH /user/packages/container/{package_name}/visibility";

            try {
              const params = ownerData.type === "Organization"
                ? { org: owner, package_name: packageName, visibility: "public" }
                : { package_name: packageName, visibility: "public" };

              await github.request(endpoint, params);
              core.info(`Set GHCR package '${packageName}' visibility to public.`);
            } catch (error) {
              core.setFailed(
                "Could not set package visibility to public. " +
                "If GITHUB_TOKEN lacks access, add a GHCR_PAT secret with package admin scope. " +
                `Details: ${error.message}`
              );
            }